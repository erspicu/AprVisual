<rect width="760" height="300" fill="#100f15"/>
<text x="380.0" y="26" fill="#dcd7e3" font-size="16" font-weight="700" text-anchor="middle">2C02: pass-gate pair verdicts — engine proxy vs physics (6820 pairs)</text>
<rect x="240.0" y="70.0" width="448.0" height="30.0" fill="#7ee0a8" fill-opacity="0.85" rx="2"/>
