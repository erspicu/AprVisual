name: Deploy WebSite to GitHub Pages

# Publishes the static site in WebSite/ to GitHub Pages.
# Source branch: aot-codegen (per project decision 2026-05-30).
on:
  push:
    branches: [aot-codegen]
    paths:
      - 'WebSite/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege token scopes the deploy step needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload WebSite/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./WebSite
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
