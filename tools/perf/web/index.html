<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AprVisual — per-release performance</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="hero">
  <div class="wrap">
    <div class="topbar">
      <h1 id="title"></h1>
      <div class="langtoggle" id="lang">
        <button class="lng" data-l="zh">中文</button>
        <button class="lng" data-l="en">EN</button>
      </div>
    </div>
    <p class="sub" id="sub"></p>
    <div class="tabs" id="tabs">
      <button class="tab" data-p="x64">x64 (Zen2)</button>
      <button class="tab" data-p="arm64">arm64 (Pi 5)</button>
    </div>
    <div class="metaline mut" id="metaline"></div>
    <div class="kpi" id="kpi"></div>
  </div>
</div>
<div class="wrap" id="main">
  <div id="status" class="status"></div>
  <section id="content" hidden>
    <h2 id="h-boost"></h2>
    <div class="card" id="chart-boost"></div>
    <div class="card" id="bars"></div>

    <h2 id="h-cyc"></h2>
    <div class="card" id="chart-cyc"></div>

    <h2 id="h-temp"></h2>
    <div class="card" id="chart-temp"></div>

    <h2 id="h-changes"></h2>
    <div id="cards"></div>

    <h2 id="h-table"></h2>
    <div class="card scroll"><table id="table"></table></div>

    <h2 id="h-access"></h2>
    <div class="card access" id="access"></div>
  </section>
</div>
<footer class="wrap mut" id="footer"></footer>
<script src="app.js"></script>
</body>
</html>
