<text x="300.5" y="194.0" fill="#dcd7e3" font-size="13" font-weight="700" text-anchor="start">601  (8.8%)</text>
<rect x="240.0" y="226.0" width="8.7" height="30.0" fill="#968ba1" fill-opacity="0.85" rx="2"/>
<text x="232.0" y="246.0" fill="#dcd7e3" font-size="12.5" text-anchor="end">both tie (no geometry either)</text>
<text x="254.7" y="246.0" fill="#dcd7e3" font-size="13" font-weight="700" text-anchor="start">9  (0.1%)</text>
</svg>