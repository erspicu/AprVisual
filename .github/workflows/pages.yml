name: Deploy WebSite to GitHub Pages

# Publishes the static site in WebSite/ to GitHub Pages.
# Source branch: main (aot-codegen was adopted as main's content on 2026-06-02).
on:
  push:
    branches: [main]
    paths:
      - 'WebSite/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege token scopes the deploy step needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp the "last updated" date (UTC build time = last content change)
        run: |
          D=$(date -u '+%Y-%m-%d %H:%M')
          sed -i -E "s#(<span class=\"lastupd\">)[^<]*#\1$D#" WebSite/index.html
          echo "stamped last-updated = $D"
          grep -o 'lastupd">[^<]*' WebSite/index.html || true
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload WebSite/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./WebSite
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
